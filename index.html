<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación de Grado - Katalina Rojas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Encabezado -->
  <header class="header">
    <h1>Katalina Rojas</h1>
    <p>Celebración de Grado</p>
  </header>

  <!-- Sobre con pliegues triangulares y sello -->
  <section class="envelope" id="envelope">
    <!-- Solapa triangular superior -->
    <div class="flap" id="flap"></div>

    <!-- Sello centrado -->
    <div class="seal" id="seal">KR</div>

    <!-- Pliegues laterales -->
    <div class="fold-left"></div>
    <div class="fold-right"></div>

    <!-- Base inferior -->
    <div class="base"></div>

    <!-- Tarjetas dentro del sobre -->
    <div class="cards" id="cards">
      <div class="card" id="cardInvitados"></div>
      <div class="card">
        <button id="inviteBtn">Ver Invitación</button>
      </div>
    </div>
  </section>

  <!-- Pie de página -->
  <footer class="footer">
    <p>Con mucho cariño, te esperamos en este día especial</p>
  </footer>

  <!-- Script principal -->
  <script src="script.js"></script>
</body>
</html>
